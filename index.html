<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="You're invited! Friday Night Out at C.J. Trivedi's place.">
    <title>Friday Night Out - Invitation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Michroma&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="canvas-container"></div>

    <!-- SCANNER / LOADER -->
    <div id="loader">
        <div class="scan-line"></div>
        <div class="loader-text">INITIALIZING</div>
        <div style="margin-top: 20px; font-size: 10px; color: #666;">SECURE CONNECTION ESTABLISHED</div>
    </div>

    <!-- INVITATION -->
    <div id="main">
        <div class="holo-container">
            <div class="glass-card">
                <!-- Corner Decorations -->
                <div class="corner tl"></div>
                <div class="corner tr"></div>
                <div class="corner bl"></div>
                <div class="corner br"></div>

                <div class="glitch-title">Access Granted</div>
                <div class="subtitle">FRIDAY NIGHT</div>

                <div class="host-box">
                    <div class="host-from">INVITATION ORIGIN</div>
                    <div class="host-name">C.J. TRIVEDI</div>
                </div>

                <div class="details">
                    <div class="detail-item">
                        <h4><i class="far fa-clock"></i> When</h4>
                        <p>FRIDAY 5:30 PM</p>
                        <p style="font-size:0.8rem; color:#aaa;">Onwards</p>
                    </div>
                    <div class="detail-item">
                        <h4><i class="fas fa-home"></i> Where</h4>
                        <p>My Home</p>
                        <p style="font-size:0.8rem; color:#aaa;">Trivedi House</p>
                    </div>
                    <div class="detail-item">
                        <h4><i class="fas fa-utensils"></i> Dining</h4>
                        <p>Dinner</p>
                        <p style="font-size:0.8rem; color:#aaa;">Home Cooked</p>
                    </div>
                    <div class="detail-item">
                        <h4><i class="fas fa-gamepad"></i> Activity</h4>
                        <p>Games & Talks</p>
                        <p style="font-size:0.8rem; color:#aaa;">All Night</p>
                    </div>
                </div>

                <button class="accept-btn" onclick="accept()">Accept Invite</button>

                <div class="copyright">
                    &copy; 2024 // DHVANI TRIVEDI //
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
