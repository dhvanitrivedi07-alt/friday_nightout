<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE INVITE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Michroma&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            color: #0ff;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* LOADING SCREEN */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease;
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: #0ff;
            position: absolute;
            animation: scan 2s linear infinite;
            box-shadow: 0 0 10px #0ff;
        }

        .loader-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 10px;
            animation: blink 0.5s infinite;
        }

        /* MAIN CONTENT */
        #main {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* HOLOGRAPHIC CARD */
        .holo-container {
            perspective: 1000px;
            transform-style: preserve-3d;
            animation: floatCard 4s ease-in-out infinite;
        }

        .glass-card {
            width: 600px;
            max-width: 90vw;
            background: linear-gradient(135deg, rgba(0,255,255,0.1), rgba(0,255,255,0.05));
            border: 1px solid rgba(0,255,255,0.5);
            border-radius: 20px;
            padding: 40px;
            position: relative;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 30px rgba(0,255,255,0.2),
                inset 0 0 30px rgba(0,255,255,0.1);
            transform: rotateX(10deg);
            text-align: center;
        }

        /* CLONE FOR REFLECTION */
        .glass-card::after {
            content: '';
            position: absolute;
            bottom: -95%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,255,255,0.1), rgba(0,255,255,0.02));
            border: 1px solid rgba(0,255,255,0.2);
            border-radius: 20px;
            transform: scale(1, -0.3) perspective(500px) rotateX(-10deg);
            filter: blur(5px);
            opacity: 0.5;
            z-index: -1;
        }

        /* GLITCH TITLE */
        .glitch-title {
            font-family: 'Michroma', sans-serif;
            font-size: 2.5rem;
            color: #fff;
            text-transform: uppercase;
            position: relative;
            margin-bottom: 20px;
            text-shadow: 2px 2px #f0f, -2px -2px #0ff;
            animation: glitch 2s infinite;
        }

        .subtitle {
            font-family: 'Syncopate', sans-serif;
            font-size: 1rem;
            letter-spacing: 15px;
            color: #f0f;
            margin-bottom: 40px;
        }

        /* HOST INFO */
        .host-box {
            border: 1px dashed #f0f;
            padding: 15px;
            margin: 20px 0;
            background: rgba(255,0,255,0.05);
        }

        .host-name {
            font-family: 'Michroma', sans-serif;
            font-size: 2rem;
            color: #f0f;
            text-shadow: 0 0 10px #f0f;
        }

        .host-from {
            font-size: 1rem;
            letter-spacing: 3px;
            color: #aaa;
        }

        /* DETAILS GRID */
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }

        .detail-item {
            border: 1px solid rgba(0,255,255,0.3);
            padding: 15px;
            border-radius: 10px;
            transition: 0.3s;
            background: rgba(0,0,0,0.3);
        }

        .detail-item:hover {
            background: rgba(0,255,255,0.2);
            box-shadow: 0 0 20px rgba(0,255,255,0.4);
            transform: translateZ(10px);
        }

        .detail-item h4 {
            color: #0ff;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-item p {
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* BUTTON */
        .accept-btn {
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            padding: 15px 50px;
            font-family: 'Syncopate', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .accept-btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 30px #0ff;
        }

        .accept-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: shine 3s infinite;
        }

        /* FOOTER */
        .copyright {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 2px;
        }

        /* DECORATIVE UI */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #0ff;
            transition: 0.3s;
        }
        .tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
        .tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
        .br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

        /* ANIMATIONS */
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes floatCard {
            0%, 100% { transform: rotateX(10deg) translateY(0); }
            50% { transform: rotateX(10deg) translateY(-20px); }
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px #f0f, -2px -2px #0ff; }
            2% { text-shadow: -2px 2px #0ff, 2px -2px #f0f; transform: translate(2px,0); }
            4% { text-shadow: 2px 2px #f0f, -2px -2px #0ff; transform: translate(0,0); }
            96% { text-shadow: 2px 2px #f0f, -2px -2px #0ff; }
            98% { text-shadow: -2px 2px #0ff, 2px -2px #f0f; transform: translate(-2px,0); }
            100% { text-shadow: 2px 2px #f0f, -2px -2px #0ff; transform: translate(0,0); }
        }

        @keyframes shine {
            0% { left: -100%; }
            20%, 100% { left: 200%; }
        }

        .reveal-anim {
            animation: revealCard 2s forwards;
        }

        @keyframes revealCard {
            0% { opacity: 0; transform: scale(0.5) rotateX(-90deg); }
            100% { opacity: 1; transform: scale(1) rotateX(10deg); }
        }

        @media (max-width: 600px) {
            .details { grid-template-columns: 1fr; }
            .glitch-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- SCANNER / LOADER -->
    <div id="loader">
        <div class="scan-line"></div>
        <div class="loader-text">INITIALIZING</div>
        <div style="margin-top: 20px; font-size: 10px; color: #666;">SECURE CONNECTION ESTABLISHED</div>
    </div>

    <!-- INVITATION -->
    <div id="main">
        <div class="holo-container">
            <div class="glass-card">
                <!-- Corner Decorations -->
                <div class="corner tl"></div>
                <div class="corner tr"></div>
                <div class="corner bl"></div>
                <div class="corner br"></div>

                <div class="glitch-title">Access Granted</div>
                <div class="subtitle">FRIDAY NIGHT</div>

                <div class="host-box">
                    <div class="host-from">INVITATION ORIGIN</div>
                    <div class="host-name">C.J. TRIVEDI</div>
                </div>

                <div class="details">
                    <div class="detail-item">
                        <h4><i class="far fa-clock"></i> When</h4>
                        <p>FRIDAY 5:30 PM</p>
                        <p style="font-size:0.8rem; color:#aaa;">Onwards</p>
                    </div>
                    <div class="detail-item">
                        <h4><i class="fas fa-map-pin"></i> Where</h4>
                        <p>My Home</p>
                        <p style="font-size:0.8rem; color:#aaa;">Trivedi House</p>
                    </div>
                    <div class="detail-item">
                        <h4><i class="fas fa-utensils"></i> Dining</h4>
                        <p>Dinner</p>
                        <p style="font-size:0.8rem; color:#aaa;">Home Cooked</p>
                    </div>
                    <div class="detail-item">
                        <h4><i class="fas fa-gamepad"></i> Activity</h4>
                        <p>Games & Talks</p>
                        <p style="font-size:0.8rem; color:#aaa;">All Night</p>
                    </div>
                </div>

                <button class="accept-btn" onclick="accept()">Accept Invite</button>

                <div class="copyright">
                    &copy; 2024 // DHVANI TRIVEDI //
                </div>
            </div>
        </div>

        <script>
            // THREE.JS BACKGROUND
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            camera.position.z = 20;

            // CREATE GRID FLOOR (RETRO Synthwave)
            const gridHelper = new THREE.GridHelper(100, 50, 0x00ffff, 0x110022);
            gridHelper.position.y = -15;
            gridHelper.position.z = -10;
            scene.add(gridHelper);

            // CREATE FLOATING CUBES
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
            
            const cubes = [];
            for(let i = 0; i < 30; i++) {
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(
                    (Math.random() - 0.5) * 60,
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 40 - 10
                );
                cube.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                scene.add(cube);
                cubes.push({
                    mesh: cube,
                    rotSpeed: Math.random() * 0.02,
                    floatSpeed: Math.random() * 0.01,
                    floatOffset: Math.random() * Math.PI * 2
                });
            }

            // PARTICLES
            const particlesGeo = new THREE.BufferGeometry();
            const particleCount = 500;
            const posArray = new Float32Array(particleCount * 3);
            
            for(let i = 0; i < particleCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 80;
            }
            
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particlesMat = new THREE.PointsMaterial({
                size: 0.1,
                color: 0xff00ff
            });
            const particles = new THREE.Points(particlesGeo, particlesMat);
            scene.add(particles);

            let mouseX = 0, mouseY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
                mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
            });

            // ANIMATION LOOP
            const clock = new THREE.Clock();
            
            function animate() {
                requestAnimationFrame(animate);
                const time = clock.getElapsedTime();

                // Rotate cubes
                cubes.forEach(c => {
                    c.mesh.rotation.x += c.rotSpeed;
                    c.mesh.rotation.y += c.rotSpeed;
                    c.mesh.position.y += Math.sin(time + c.floatOffset) * c.floatSpeed;
                });

                // Move particles
                particles.rotation.y = time * 0.05;

                // Camera parallax
                camera.position.x += (mouseX * 5 - camera.position.x) * 0.05;
                camera.position.y += (-mouseY * 5 - camera.position.y) * 0.05;
                camera.lookAt(scene.position);

                renderer.render(scene, camera);
            }

            animate();

            // RESIZE
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // REVEAL LOGIC
            setTimeout(() => {
                // Hide loader
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    // Show main invitation
                    const main = document.getElementById('main');
                    main.style.opacity = '1';
                    main.style.pointerEvents = 'all';
                    // Add reveal animation
                    const container = document.querySelector('.holo-container');
                    container.classList.add('reveal-anim');
                }, 1500);
            }, 2000);

            function accept() {
                alert("You're in! See you Friday! 🎉");
            }
        </script>
    </div>
</body>
</html>
